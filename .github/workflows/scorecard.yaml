name: Scorecard
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron:  '30 1 * * 6'

permissions: read-all

jobs:
  workflow:
    name: Reusable Workflow
    uses: action-stars/generic-workflows/.github/workflows/scorecard.yaml@436b5d8ebbc67151ec77f214d667d7393c3916af # v0.11.0
    permissions:
      id-token: write
      security-events: write
    with:
      retention_days: 7
